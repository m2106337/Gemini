name: "Gemini CLI Action"
description: "Run the project's gemini.py CLI inside a workflow."
inputs:
  command:
    description: 'Command to pass to gemini.py (e.g., "/init", "/gemini summary", "/gemini help")'
    required: true
    default: '/gemini help'

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Gemini
      shell: bash
      run: |
        python gemini.py ${{ inputs.command }}

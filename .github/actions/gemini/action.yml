name: "Gemini CLI Action"
description: "Run the project's gemini.py CLI inside a workflow using a Docker runner."
inputs:
  command:
    description: 'Command to pass to gemini.py (e.g., "/init", "/gemini summary", "/gemini help")'
    required: true
    default: '/gemini help'

runs:
  using: "docker"
  image: "Dockerfile"
  args:
    - '${{ inputs.command }}'
